<script>
const COLORS = ['#FF6B6B','#4ecdc4','#ffd166','#6a89cc','#a29bfe','#55efc4','#fd79a8','#fab1a0'];
function genCode() { return String(Math.floor(1000 + Math.random() * 9000)); }
function genId() { return Math.random().toString(36).slice(2, 10); }

// ---------- 音 ----------
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
  }
  return audioCtx;
}
function beep(freq, dur, type, delay) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const t0 = ctx.currentTime + (delay || 0);
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = 0.22;
  o.connect(g); g.connect(ctx.destination);
  o.start(t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur / 1000);
  o.stop(t0 + dur / 1000 + 0.02);
}
function soundBuzz() { beep(1300, 140, 'square'); }
function soundDing() { beep(1700, 100, 'sine'); }
function soundCorrect() {
  // ピンポンピンポンピンポン
  for (let i = 0; i < 3; i++) {
    beep(988, 130, 'sine', i * 0.32);
    beep(740, 160, 'sine', i * 0.32 + 0.15);
  }
}
function soundWrong() {
  // ブッブー
  beep(160, 260, 'sawtooth', 0);
  beep(130, 380, 'sawtooth', 0.3);
}

// Firebase 初期化
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

const myId = genId();
let roomCode = '';
let playerName = '';
let currentRound = 0;
let myBuzzedRound = -1;
let watchedBuzzRound = -1;
let currentBuzzRef = null;
let lastRankingLenHost = 0;
let lastRankingLenPlayer = 0;
let localArmed = false;
let scheduledStartTime = -1;
let armTimerId = null;
function clearArmTimer() {
  if (armTimerId) { clearInterval(armTimerId); armTimerId = null; }
}
function scheduleLocalArm(startTime) {
  clearArmTimer();
  localArmed = false;
  scheduledStartTime = startTime;
  if (!startTime) return;
  const check = () => {
    if (Date.now() >= startTime) {
      localArmed = true;
      clearArmTimer();
      updatePlayerUI();
    }
  };
  check();
  if (!localArmed) armTimerId = setInterval(check, 30);
}
let windowEndScheduledFor = -1;
let windowEndTimerId = null;
const BUZZ_WINDOW_MS = 60000;
function scheduleWindowEnd(firstBuzzTime) {
  if (windowEndScheduledFor === firstBuzzTime) return;
  if (windowEndTimerId) clearTimeout(windowEndTimerId);
  windowEndScheduledFor = firstBuzzTime;
  const remain = Math.max(0, firstBuzzTime + BUZZ_WINDOW_MS - Date.now());
  windowEndTimerId = setTimeout(() => { updatePlayerUI(); }, remain + 50);
}
function clearWindowTimer() {
  if (windowEndTimerId) { clearTimeout(windowEndTimerId); windowEndTimerId = null; }
  windowEndScheduledFor = -1;
}
let lastPlayerData = null;
let amJoined = false;
let ownPlayerRef = null;
let correctNotifiedRound = -1;
let wrongNotifiedRound = -1;
let wrongNotifiedUpTo = -1;

const screens = {
  select: document.getElementById('screen-select'),
  host: document.getElementById('screen-host'),
  player: document.getElementById('screen-player'),
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
}

function renderRanking(containerId, panelId, data) {
  const panel = document.getElementById(panelId);
  const el = document.getElementById(containerId);
  const ranking = data.ranking || [];
  if (ranking.length === 0) {
    panel.classList.add('hidden');
    return;
  }
  panel.classList.remove('hidden');
  const judgedIndex = data.judgedIndex || 0;
  el.innerHTML = ranking.map((r, i) => {
    const sec = (r.time / 1000).toFixed(2);
    let cls = 'rank-item';
    if (data.finished) {
      if (data.winner && r.id === data.winner.id) cls += ' rank-current';
      else cls += ' rank-judged';
    } else if (i < judgedIndex) {
      cls += ' rank-judged';
    } else if (i === judgedIndex) {
      cls += ' rank-current';
    }
    return `<div class="${cls}"><span class="rank-num">${i + 1}</span><span class="rank-name">${r.name}</span><span class="rank-time">${sec}秒</span></div>`;
  }).join('');
}

function renderScores(containerId, data) {
  const el = document.getElementById(containerId);
  const players = data.players || {};
  const scores = data.scores || {};
  const ids = Object.keys(players);
  if (ids.length === 0) { el.innerHTML = ''; return; }
  const list = ids.map(id => ({
    name: players[id],
    correct: (scores[id] && scores[id].correct) || 0,
    wrong: (scores[id] && scores[id].wrong) || 0,
  }));
  list.sort((a, b) => (b.correct - a.correct) || (a.wrong - b.wrong));
  el.innerHTML = '<div class="panel-title">🏆 成績ランキング</div>' + list.map((p, i) =>
    `<div class="score-item"><span class="score-rank">${i + 1}</span><span class="score-name">${p.name}</span><span class="score-stat">○${p.correct}　✕${p.wrong}</span></div>`
  ).join('');
}

// ---------- ホスト ----------
document.getElementById('btnCreateRoom').onclick = () => {
  roomCode = genCode();
  const initData = { round: 0, armed: false, startTime: 0, players: {}, scores: {}, winner: null, ranking: null, judgedIndex: 0, finished: false, firstBuzzTime: null };
  db.ref('rooms/' + roomCode).set(initData).then(() => {
    document.getElementById('hostCode').textContent = roomCode;
    showScreen('host');
    listenHost();
  }).catch(() => {
    showError('ルーム作成に失敗しました。Firebaseの設定を確認してください。');
  });
};

function listenHost() {
  const roomRef = db.ref('rooms/' + roomCode);
  roomRef.on('value', (snap) => {
    const data = snap.val();
    if (!data) return;
    currentRound = data.round || 0;

    const playersDiv = document.getElementById('hostPlayers');
    const players = data.players || {};
    const ids = Object.keys(players);
    if (ids.length === 0) {
      playersDiv.innerHTML = '<div class="sub-faint">参加者がここに表示されます</div>';
    } else {
      playersDiv.innerHTML = ids.map((id, i) => {
        const isWinner = data.winner && data.winner.id === id;
        return `<span class="player-chip" style="background:${COLORS[i % COLORS.length]};${isWinner ? 'outline:3px solid #fff;' : ''}">${players[id]}<button class="kick-btn" data-id="${id}" title="退出させる">×</button></span>`;
      }).join('');
    }

    const ranking = data.ranking || [];
    if (ranking.length > lastRankingLenHost) soundDing();
    lastRankingLenHost = ranking.length;

    const statusEl = document.getElementById('hostStatus');
    statusEl.className = 'status' + (data.finished && data.winner ? ' winner' : '');
    if (data.finished && data.winner) {
      const sec = ((data.winner.time || 0) / 1000).toFixed(2);
      statusEl.textContent = `🎉 ${data.winner.name} が正解！（${sec}秒）`;
    } else if (data.finished && !data.winner) {
      statusEl.textContent = '😢 全員不正解…';
    } else if (ranking.length > 0) {
      const windowOpen = data.firstBuzzTime && (Date.now() - data.firstBuzzTime < 60000);
      statusEl.textContent = windowOpen ? '🙋 判定してください（しばらく他の人も押せます）' : '🙋 判定してください';
    } else if (data.armed) {
      statusEl.textContent = '🟢 受付中！';
    } else if (data.round > 0) {
      statusEl.textContent = '⏳ まもなく受付開始…';
    } else {
      statusEl.textContent = '「開始」を押して問題をスタート';
    }

    renderRanking('hostRanking', 'hostRankingPanel', data);
    renderScores('hostScores', data);

    const judgeRow = document.getElementById('hostJudgeRow');
    const showJudge = ranking.length > 0 && !data.finished && (data.judgedIndex || 0) < ranking.length;
    judgeRow.classList.toggle('hidden', !showJudge);

    document.getElementById('btnStartRound').textContent = data.round === 0 ? '開始（受付スタート）' : '次の問題へ';

    if (data.round > 0 && watchedBuzzRound !== data.round) {
      watchBuzzes(data.round);
    }
  });
}

function watchBuzzes(round) {
  if (currentBuzzRef) currentBuzzRef.off();
  watchedBuzzRound = round;
  currentBuzzRef = db.ref(`rooms/${roomCode}/buzzes/${round}`);
  currentBuzzRef.on('value', (snap) => {
    const buzzes = snap.val();
    if (!buzzes) return;
    db.ref('rooms/' + roomCode).once('value').then((s) => {
      const cur = s.val();
      if (!cur || cur.round !== round) return;
      const players = cur.players || {};
      const entries = Object.entries(buzzes).sort((a, b) => a[1] - b[1]);
      const ranking = entries.map(([id, t]) => ({ id, name: players[id] || '不明', time: t - cur.startTime }));
      const updates = { ranking };
      if (!cur.firstBuzzTime) updates.firstBuzzTime = entries[0][1];
      db.ref('rooms/' + roomCode).update(updates);
    });
  });
}

document.getElementById('hostPlayers').addEventListener('click', (e) => {
  const btn = e.target.closest('.kick-btn');
  if (!btn) return;
  const id = btn.getAttribute('data-id');
  if (!id || !roomCode) return;
  db.ref(`rooms/${roomCode}/players/${id}`).remove();
  db.ref(`rooms/${roomCode}/scores/${id}`).remove();
});

document.getElementById('btnHostExit').onclick = () => {
  if (!roomCode) { showScreen('select'); return; }
  db.ref('rooms/' + roomCode).off();
  if (currentBuzzRef) currentBuzzRef.off();
  const codeToRemove = roomCode;
  roomCode = '';
  db.ref('rooms/' + codeToRemove).remove();
  showScreen('select');
};

function showEffect(type) {
  const overlay = document.getElementById('effectOverlay');
  const emoji = document.getElementById('effectEmoji');
  overlay.className = 'effect-overlay ' + type;
  emoji.textContent = type === 'correct' ? '⭕' : '❌';
  requestAnimationFrame(() => overlay.classList.add('show'));
  clearTimeout(overlay._hideTimer);
  overlay._hideTimer = setTimeout(() => {
    overlay.classList.remove('show');
  }, 1100);
}
document.getElementById('btnWrong').onclick = () => judge(false);
document.getElementById('btnCorrect').onclick = () => judge(true);

function judge(isCorrect) {
  db.ref('rooms/' + roomCode).once('value').then((s) => {
    const cur = s.val();
    if (!cur || !cur.ranking || cur.finished) return;
    const idx = cur.judgedIndex || 0;
    if (idx >= cur.ranking.length) return;
    const entry = cur.ranking[idx];
    const pid = entry.id;
    const curScore = (cur.scores && cur.scores[pid]) || { correct: 0, wrong: 0 };
    const updates = {};
    if (isCorrect) {
      updates[`scores/${pid}/correct`] = (curScore.correct || 0) + 1;
      updates.finished = true;
      updates.winner = { id: pid, name: entry.name, time: entry.time };
      soundCorrect();
    } else {
      updates[`scores/${pid}/wrong`] = (curScore.wrong || 0) + 1;
      const nextIdx = idx + 1;
      updates.judgedIndex = nextIdx;
      if (nextIdx >= cur.ranking.length) updates.finished = true;
      soundWrong();
    }
    db.ref('rooms/' + roomCode).update(updates);
  });
}

document.getElementById('btnStartRound').onclick = () => {
  const delay = 800 + Math.random() * 1500;
  db.ref('rooms/' + roomCode).once('value').then((snap) => {
    const cur = snap.val();
    const round = (cur.round || 0) + 1;
    const startTime = Date.now() + delay;
    lastRankingLenHost = 0;
    lastRankingLenPlayer = 0;
    db.ref('rooms/' + roomCode).update({
      round, armed: false, startTime, winner: null, ranking: null, judgedIndex: 0, finished: false, firstBuzzTime: null,
    }).then(() => {
      setTimeout(() => {
        db.ref('rooms/' + roomCode).once('value').then((s2) => {
          const cur2 = s2.val();
          if (cur2 && cur2.round === round) {
            db.ref('rooms/' + roomCode).update({ armed: true });
          }
        });
      }, delay);
    });
  });
};

document.getElementById('btnShareLine').onclick = () => {
  const text = `🔔 早押しクイズに参加しよう！\nルームコード: ${roomCode}\n\nこのページを開いて「プレイヤーとして参加」からコードと名前を入力してね。\n${location.href}`;
  window.open('https://line.me/R/msg/text/?' + encodeURIComponent(text), '_blank');
};

// ---------- プレイヤー ----------
function showError(msg) {
  const el = document.getElementById('selectError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

document.getElementById('btnJoinRoom').onclick = () => {
  const code = document.getElementById('inputJoinCode').value.trim();
  const name = document.getElementById('inputPlayerName').value.trim();
  if (!code || !name) { showError('コードと名前を入力してください'); return; }

  db.ref('rooms/' + code).once('value').then((snap) => {
    const data = snap.val();
    if (!data) { showError('ルームが見つかりません。コードを確認してください'); return; }
    roomCode = code;
    playerName = name;
    const updates = {};
    updates[`players/${myId}`] = name;
    updates[`scores/${myId}`] = { correct: 0, wrong: 0 };
    db.ref('rooms/' + roomCode).update(updates).then(() => {
      document.getElementById('playerInfo').textContent = `ルーム ${roomCode} / ${name} さん`;
      amJoined = true;
      correctNotifiedRound = -1;
      wrongNotifiedRound = -1;
      wrongNotifiedUpTo = -1;
      showScreen('player');
      listenPlayer();
      ownPlayerRef = db.ref(`rooms/${roomCode}/players/${myId}`);
      ownPlayerRef.on('value', (psnap) => {
        if (psnap.val() === null && amJoined) {
          handleKicked();
        }
      });
    });
  }).catch(() => showError('ルームの取得に失敗しました'));
};

function handleKicked() {
  amJoined = false;
  clearArmTimer();
  clearWindowTimer();
  scheduledStartTime = -1;
  localArmed = false;
  if (roomCode) db.ref('rooms/' + roomCode).off();
  if (ownPlayerRef) { ownPlayerRef.off(); ownPlayerRef = null; }
  roomCode = '';
  myBuzzedRound = -1;
  showScreen('select');
  showError('ホストによってルームから退出させられました');
}

function listenPlayer() {
  const roomRef = db.ref('rooms/' + roomCode);
  roomRef.on('value', (snap) => {
    const data = snap.val();
    if (!data) return;
    lastPlayerData = data;

    if (data.round !== currentRound) {
      currentRound = data.round;
      myBuzzedRound = -1;
      clearWindowTimer();
    }
    if (data.startTime !== scheduledStartTime) {
      scheduleLocalArm(data.startTime);
    }

    const ranking = data.ranking || [];
    if (ranking.length > lastRankingLenPlayer) soundDing();
    lastRankingLenPlayer = ranking.length;

    updatePlayerUI();
    renderRanking('playerRanking', 'playerRankingPanel', data);
    renderScores('playerScores', data);
  });
}

function updatePlayerUI() {
  const data = lastPlayerData;
  if (!data) return;
  const buzzBtn = document.getElementById('btnBuzz');
  const statusEl = document.getElementById('playerStatus');
  const ranking = data.ranking || [];
  const judgedIndex = data.judgedIndex || 0;

  // 正解者本人にのみエフェクト
  if (data.finished && data.winner && correctNotifiedRound !== data.round) {
    correctNotifiedRound = data.round;
    if (data.winner.id === myId) { soundCorrect(); showEffect('correct'); }
  }
  // 不正解と判定された本人にのみエフェクト（ラウンドが変わったらリセット）
  if (wrongNotifiedRound !== data.round) {
    wrongNotifiedRound = data.round;
    wrongNotifiedUpTo = -1;
  }
  for (let i = wrongNotifiedUpTo + 1; i < judgedIndex; i++) {
    const entry = ranking[i];
    if (entry && entry.id === myId) { soundWrong(); showEffect('wrong'); }
  }
  wrongNotifiedUpTo = judgedIndex - 1;

  statusEl.className = 'status' + (data.finished && data.winner && data.winner.id === myId ? ' winner' : '');

  const myRank = ranking.findIndex(r => r.id === myId);
  const alreadyBuzzed = myRank >= 0 || myBuzzedRound === currentRound;
  const windowOpen = ranking.length > 0 && data.firstBuzzTime && (Date.now() - data.firstBuzzTime < BUZZ_WINDOW_MS);

  if (data.finished && data.winner) {
    statusEl.textContent = data.winner.id === myId ? '🎉 あなたが正解です！' : `${data.winner.name} が正解しました`;
    buzzBtn.disabled = true;
  } else if (data.finished && !data.winner) {
    statusEl.textContent = '😢 今回は正解者なし';
    buzzBtn.disabled = true;
  } else if (alreadyBuzzed) {
    if (myRank === judgedIndex) {
      statusEl.textContent = '🙋 あなたの解答を判定中です…';
    } else if (myRank >= 0 && myRank < judgedIndex) {
      statusEl.textContent = '不正解でした。結果を待っています';
    } else if (myRank > judgedIndex) {
      statusEl.textContent = '⏳ 順番を待っています…';
    } else {
      statusEl.textContent = '送信しました…結果を待っています';
    }
    buzzBtn.disabled = true;
  } else if (windowOpen && localArmed) {
    statusEl.textContent = '🟢 まだ押せます！';
    buzzBtn.disabled = false;
    scheduleWindowEnd(data.firstBuzzTime);
  } else if (ranking.length > 0) {
    statusEl.textContent = '⌛ 受付終了（今回は押せませんでした）';
    buzzBtn.disabled = true;
  } else if (localArmed && data.round > 0) {
    statusEl.textContent = '🟢 押せます！';
    buzzBtn.disabled = false;
  } else {
    statusEl.textContent = '⏳ 待機中…';
    buzzBtn.disabled = true;
  }
}

document.getElementById('btnBuzz').onclick = () => {
  if (myBuzzedRound === currentRound) return;
  myBuzzedRound = currentRound;
  document.getElementById('btnBuzz').disabled = true;
  document.getElementById('playerStatus').textContent = '送信しました…結果を待っています';
  soundBuzz();
  db.ref(`rooms/${roomCode}/buzzes/${currentRound}/${myId}`).set(Date.now());
};

document.getElementById('btnExit').onclick = () => {
  amJoined = false;
  clearArmTimer();
  clearWindowTimer();
  scheduledStartTime = -1;
  localArmed = false;
  if (!roomCode) { showScreen('select'); return; }
  if (ownPlayerRef) { ownPlayerRef.off(); ownPlayerRef = null; }
  db.ref(`rooms/${roomCode}/players/${myId}`).remove();
  db.ref(`rooms/${roomCode}/scores/${myId}`).remove();
  db.ref('rooms/' + roomCode).off();
  roomCode = '';
  myBuzzedRound = -1;
  document.getElementById('inputJoinCode').value = '';
  document.getElementById('inputPlayerName').value = '';
  showScreen('select');
};
</script>
